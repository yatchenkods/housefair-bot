services:
  housefair-bot:
    build: .
    container_name: housefair_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  housefair-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: housefair_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - housefair-bot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
