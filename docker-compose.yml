services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file: .env

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    depends_on:
      - api
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
